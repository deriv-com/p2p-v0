name: Build Staging and Deploy to Cloudflare Pages

on:
    push:
        branches:
            - 'main'

permissions:
    contents: read

concurrency:
    group: cloudflare-pages-build-staging
    cancel-in-progress: true

jobs:
    build_to_cloudflare_pages:
        timeout-minutes: 30
        runs-on: ubuntu-latest
        environment: staging
        steps:
            - name: Checkout to main branch
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                run_install: false

            - name: Setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build for Cloudflare
              run: pnpm run cf:build
              env:
                NEXT_PUBLIC_BASE_URL: ${{ vars.NEXT_PUBLIC_BASE_URL }}
                NEXT_PUBLIC_CORE_URL: ${{ vars.NEXT_PUBLIC_CORE_URL }}
                NEXT_PUBLIC_CORE_ME_URL: ${{ vars.NEXT_PUBLIC_CORE_ME_URL }}
                NEXT_PUBLIC_CORE_BE_URL: ${{ vars.NEXT_PUBLIC_CORE_BE_URL }}
                NEXT_PUBLIC_SOCKET_URL: ${{ vars.NEXT_PUBLIC_SOCKET_URL }}
                NEXT_PUBLIC_SOCKET_ME_URL: ${{ vars.NEXT_PUBLIC_SOCKET_ME_URL }}
                NEXT_PUBLIC_SOCKET_BE_URL: ${{ vars.NEXT_PUBLIC_SOCKET_BE_URL }}
                NEXT_PUBLIC_CASHIER_URL: ${{ vars.NEXT_PUBLIC_CASHIER_URL }}
                NEXT_PUBLIC_DATADOG_APPLICATION_ID: ${{ vars.NEXT_PUBLIC_DATADOG_APPLICATION_ID }}
                NEXT_PUBLIC_DATADOG_CLIENT_TOKEN: ${{ vars.NEXT_PUBLIC_DATADOG_CLIENT_TOKEN }}
                NEXT_PUBLIC_DATADOG_ENV: ${{ vars.NEXT_PUBLIC_DATADOG_ENV }}
                NEXT_PUBLIC_DATADOG_SERVICE: ${{ vars.NEXT_PUBLIC_DATADOG_SERVICE }}
                NEXT_PUBLIC_DATADOG_SESSION_REPLAY_SAMPLE_RATE: ${{ vars.NEXT_PUBLIC_DATADOG_SESSION_REPLAY_SAMPLE_RATE }}
                NEXT_PUBLIC_DATADOG_SESSION_SAMPLE_RATE: ${{ vars.NEXT_PUBLIC_DATADOG_SESSION_SAMPLE_RATE }}
                NEXT_PUBLIC_DATADOG_VERSION: ${{ vars.NEXT_PUBLIC_DATADOG_VERSION }}
                NEXT_PUBLIC_DATA_SOURCE: ${{ vars.NEXT_PUBLIC_DATA_SOURCE }}
                NEXT_PUBLIC_BRANCH: ${{ vars.NEXT_PUBLIC_BRANCH }}
                NEXT_PUBLIC_NOTIFICATION_APPLICATION_ID: ${{ vars.NEXT_PUBLIC_NOTIFICATION_APPLICATION_ID }}
                NEXT_PUBLIC_NOTIFICATION_URL: ${{ vars.NEXT_PUBLIC_NOTIFICATION_URL }}
                NEXT_PUBLIC_IS_ORY_ENABLED: ${{ vars.NEXT_PUBLIC_IS_ORY_ENABLED }}
                NEXT_PUBLIC_ORY_URL: ${{ vars.NEXT_PUBLIC_ORY_URL }}
                NEXT_PUBLIC_ORY_ME_URL: ${{ vars.NEXT_PUBLIC_ORY_ME_URL }}
                NEXT_PUBLIC_ORY_BE_URL: ${{ vars.NEXT_PUBLIC_ORY_BE_URL }}
                NEXT_PUBLIC_POSTHOG_KEY: ${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}
                NEXT_PUBLIC_POSTHOG_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}
                NEXT_PUBLIC_POSTHOG_ME_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_ME_HOST }}
                NEXT_PUBLIC_POSTHOG_BE_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_BE_HOST }}
                NEXT_PUBLIC_FLOATING_RATE_ENABLED: ${{ vars.NEXT_PUBLIC_FLOATING_RATE_ENABLED }}
                NEXT_PUBLIC_INTERCOM_APP_ID: ${{ vars.NEXT_PUBLIC_INTERCOM_APP_ID }}
                NEXT_PUBLIC_IS_CLOSED_GROUP_ENABLED: ${{ vars.NEXT_PUBLIC_IS_CLOSED_GROUP_ENABLED }}
                NEXT_PUBLIC_CLIENT_URL: ${{ vars.NEXT_PUBLIC_CLIENT_URL }}
                NEXT_PUBLIC_IS_KYC_MANDATORY: ${{ vars.NEXT_PUBLIC_IS_KYC_MANDATORY }}
                NEXT_PUBLIC_RELEASE_TAG: ${{ vars.NEXT_PUBLIC_RELEASE_TAG }}
                NEXT_PUBLIC_P2P_WHATS_NEW_ENABLED: ${{ vars.NEXT_PUBLIC_P2P_WHATS_NEW_ENABLED }}
                NEXT_PUBLIC_P2P_WHATS_COMING_TAG: ${{ vars.NEXT_PUBLIC_P2P_WHATS_COMING_TAG }}
                NEXT_PUBLIC_NODE_ENV: staging
                NODE_ENV: staging

            - name: Prepare Pages deployment bundle
              run: |
                cp .open-next/worker.js .open-next/assets/_worker.js

            - name: Replace placeholders in wrangler.toml
              run: |
                sed -i "s/PROJECT_NAME/${{ secrets.CLOUDFLARE_PROJECT_NAME }}/g" wrangler.toml
              shell: bash

            - name: List output folder contents for debugging
              run: ls -lR .open-next/assets

            - name: Publish to Cloudflare Pages
              uses: "deriv-com/shared-actions/.github/actions/publish_to_pages_branch@master"
              with:
                CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                project_name: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
                branch_name: staging
                output_dir: .open-next/assets
                directory: dist
                cname_url: staging-dp2p.deriv.com
