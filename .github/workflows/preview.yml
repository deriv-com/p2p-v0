name: PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  preview:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('app/**', 'components/**', 'lib/**', 'hooks/**', 'stores/**', 'services/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for preview (staging APIs)
        run: pnpm cf:build
        env:
          # ── Build-time required (next.config.ts rewrites read NEXT_PUBLIC_CORE_URL) ──
          NEXT_PUBLIC_CORE_URL: ${{ vars.NEXT_PUBLIC_CORE_URL || 'https://staging-api-core.deriv.com' }}
          NEXT_PUBLIC_CORE_ME_URL: ${{ vars.NEXT_PUBLIC_CORE_ME_URL || 'https://staging-api-core.deriv.me' }}
          NEXT_PUBLIC_CORE_BE_URL: ${{ vars.NEXT_PUBLIC_CORE_BE_URL || 'https://staging-api-core.deriv.be' }}
          # ── Auth (Ory Kratos) ────────────────────────────────────────────
          NEXT_PUBLIC_IS_ORY_ENABLED: ${{ vars.NEXT_PUBLIC_IS_ORY_ENABLED || '1' }}
          NEXT_PUBLIC_ORY_URL: ${{ vars.NEXT_PUBLIC_ORY_URL || 'https://staging-auth.deriv.com' }}
          NEXT_PUBLIC_ORY_ME_URL: ${{ vars.NEXT_PUBLIC_ORY_ME_URL || 'https://staging-auth.deriv.me' }}
          NEXT_PUBLIC_ORY_BE_URL: ${{ vars.NEXT_PUBLIC_ORY_BE_URL || 'https://staging-auth.deriv.be' }}
          # ── WebSocket ────────────────────────────────────────────────────
          NEXT_PUBLIC_SOCKET_URL: ${{ vars.NEXT_PUBLIC_SOCKET_URL || 'wss://staging-blue.deriv.com' }}
          NEXT_PUBLIC_SOCKET_ME_URL: ${{ vars.NEXT_PUBLIC_SOCKET_ME_URL || 'wss://staging-blue.deriv.me' }}
          NEXT_PUBLIC_SOCKET_BE_URL: ${{ vars.NEXT_PUBLIC_SOCKET_BE_URL || 'wss://staging-blue.deriv.be' }}
          # ── Environment metadata ─────────────────────────────────────────
          NEXT_PUBLIC_NODE_ENV: staging
          NEXT_PUBLIC_RELEASE_TAG: pr-${{ github.event.number }}-${{ github.sha }}
          # ── Optional integrations (left blank in previews unless set in GH) ──
          NEXT_PUBLIC_DATADOG_APPLICATION_ID: ${{ vars.NEXT_PUBLIC_DATADOG_APPLICATION_ID }}
          NEXT_PUBLIC_DATADOG_CLIENT_TOKEN: ${{ vars.NEXT_PUBLIC_DATADOG_CLIENT_TOKEN }}
          NEXT_PUBLIC_DATADOG_SERVICE: ${{ vars.NEXT_PUBLIC_DATADOG_SERVICE }}
          NEXT_PUBLIC_DATADOG_ENV: preview
          NEXT_PUBLIC_DATADOG_VERSION: pr-${{ github.event.number }}
          NEXT_PUBLIC_DATADOG_SESSION_SAMPLE_RATE: ${{ vars.NEXT_PUBLIC_DATADOG_SESSION_SAMPLE_RATE }}
          NEXT_PUBLIC_DATADOG_SESSION_REPLAY_SAMPLE_RATE: ${{ vars.NEXT_PUBLIC_DATADOG_SESSION_REPLAY_SAMPLE_RATE }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}
          NEXT_PUBLIC_RUDDERSTACK_KEY: ${{ vars.NEXT_PUBLIC_RUDDERSTACK_KEY }}
          NEXT_PUBLIC_INTERCOM_APP_ID: ${{ vars.NEXT_PUBLIC_INTERCOM_APP_ID }}
          NEXT_PUBLIC_NOTIFICATION_APPLICATION_ID: ${{ vars.NEXT_PUBLIC_NOTIFICATION_APPLICATION_ID }}

      - name: Deploy preview
        run: |
          npx wrangler versions upload --env preview \
            --preview-alias "pr-$PR_NUMBER" \
            --message "PR #$PR_NUMBER — $PR_TITLE"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PR_NUMBER: ${{ github.event.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const subdomain = '${{ vars.CLOUDFLARE_PREVIEW_SUBDOMAIN }}';
            if (!subdomain) {
              console.log('CLOUDFLARE_PREVIEW_SUBDOMAIN not set; skipping comment');
              return;
            }
            const url = `https://pr-${pr}-dp2p-preview.${subdomain}.workers.dev`;
            const body = `## Preview deployment\n\n🚀 **Preview URL:** ${url}\n\n_Deployed from commit ${context.sha.slice(0, 7)}_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Preview deployment')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }
