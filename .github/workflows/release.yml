name: Release to Production

on:
  push:
    tags:
      - 'production_[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]_*'

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-production-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('app/**', 'components/**', 'lib/**', 'hooks/**', 'stores/**', 'services/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-production-${{ hashFiles('**/pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-production-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for production
        run: pnpm cf:build
        env:
          # TODO: configure p2p-v0 production env vars in the GitHub `production`
          # environment (Settings → Environments → production → Variables).
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_AUTH_BASE_URL: ${{ vars.NEXT_PUBLIC_AUTH_BASE_URL }}
          NEXT_PUBLIC_ORY_URL: ${{ vars.NEXT_PUBLIC_ORY_URL }}

      - name: Deploy to production
        run: pnpm cf:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                generate_release_notes: true,
              });
            } catch (err) {
              if (err.status === 422 && err.message.includes('already_exists')) {
                console.log(`Release ${tag} already exists`);
              } else {
                throw err;
              }
            }
